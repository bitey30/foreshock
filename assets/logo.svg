<svg width="760" height="200" viewBox="0 0 760 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="foreshock">
  <rect width="760" height="200" rx="24" fill="#0B1120"/>
  <rect x="0.5" y="0.5" width="759" height="199" rx="23.5" stroke="#1E293B"/>

  <!-- seismic ripples = blast radius, emanating from an epicenter -->
  <g transform="translate(132 100)" fill="none" stroke="#F59E0B" stroke-width="2.5">
    <circle r="24" opacity="0.95"/>
    <circle r="44" opacity="0.6"/>
    <circle r="66" opacity="0.36"/>
    <circle r="90" opacity="0.18"/>
    <circle r="116" opacity="0.08"/>
  </g>
  <circle cx="132" cy="100" r="8" fill="#F59E0B"/>
  <circle cx="132" cy="100" r="8" fill="#F59E0B" opacity="0.35">
    <animate attributeName="r" values="8;15;8" dur="2.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.35;0;0.35" dur="2.4s" repeatCount="indefinite"/>
  </circle>

  <!-- wordmark -->
  <text x="288" y="98" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="54" font-weight="600" letter-spacing="-1" fill="#F8FAFC">fore<tspan fill="#F59E0B">shock</tspan></text>
  <text x="290" y="132" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="18" fill="#94A3B8">inline blast-radius context for coding agents</text>
</svg>
